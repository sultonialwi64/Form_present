<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Dashboard Aspirasi - FKP PEKPPP 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/masonry/4.2.2/masonry.pkgd.min.js"></script>
  
  <!-- tsParticles -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js"></script>
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #020617; /* Very dark slate, almost black */
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(30, 58, 138, 0.15), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.08), transparent 25%);
      color: #f8fafc;
      overflow-x: hidden;
    }
    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }
    .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 215, 0, 0.1);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.8);
    }
    
    /* Header Gradient */
    .text-gradient {
      background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Aspirasi Card */
    .aspirasi-card {
      width: calc(33.333% - 24px);
      margin-bottom: 32px;
    }
    
    @media (max-width: 1024px) {
      .aspirasi-card { width: calc(50% - 24px); }
    }
    @media (max-width: 640px) {
      .aspirasi-card { width: 100%; margin-bottom: 24px; }
    }
    /* Premium Card Design */
    .premium-card-inner {
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.5);
      border-top: 1px solid rgba(255, 215, 0, 0.2);
      transition: all 0.4s ease;
    }
    .premium-card-inner:hover {
      box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.6), 0 0 15px rgba(212, 175, 55, 0.15);
      border-top-color: rgba(255, 215, 0, 0.5);
      transform: translateY(-2px);
    }

    /* Live Indicator */
    .pulse-dot {
      width: 8px;
      height: 8px;
      background-color: #d4af37;
      border-radius: 50%;
      box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
      100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #d4af37; }

    #tsparticles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col relative">

  <!-- Particle Background -->
  <div id="tsparticles"></div>

  <!-- Navbar -->
  <header class="glass-panel sticky top-0 z-50 w-full px-10 py-5 flex items-center justify-between">
    <div class="flex items-center gap-5">
      <div class="w-12 h-12 bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl flex items-center justify-center border border-slate-700/50 shadow-inner">
        <svg class="w-6 h-6 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z"></path></svg>
      </div>
      <div>
        <h1 class="text-3xl font-bold text-gradient tracking-wide mb-1">Live Aspirasi & Masukan</h1>
        <p class="text-xs font-medium text-slate-400 uppercase tracking-[0.2em]">FKP PEKPPP 2026 - Dikpora Wonosobo</p>
      </div>
    </div>
    
    <div class="flex items-center gap-6">
      <button onclick="resetData()" class="px-4 py-2 bg-red-900/50 hover:bg-red-800 text-red-200 border border-red-700/50 rounded-lg text-xs font-semibold tracking-wider transition-colors">RESET DATA</button>
      <div class="flex items-center gap-2 bg-slate-900/80 px-5 py-2.5 rounded-full border border-slate-700/50 shadow-inner">
        <div class="pulse-dot"></div>
        <span class="text-xs font-semibold text-yellow-500 tracking-wider uppercase" id="statusText">LIVE (Connecting...)</span>
      </div>
      <div class="text-right border-l border-slate-700 pl-6 ml-2">
        <div class="text-4xl font-bold text-white leading-none" id="totalCount" style="font-family: 'Playfair Display', serif;">0</div>
        <div class="text-[10px] text-slate-400 uppercase tracking-[0.15em] font-bold mt-1">Total Suara</div>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="flex-grow p-8">
    
    <!-- Empty State -->
    <div id="emptyState" class="flex flex-col items-center justify-center h-72 opacity-40 transition-opacity">
      <div class="w-20 h-20 bg-slate-800/50 rounded-full flex items-center justify-center border border-slate-700 mb-6">
        <svg class="w-10 h-10 text-yellow-600/70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
      </div>
      <h3 class="text-2xl text-slate-300" style="font-family: 'Playfair Display', serif;">Menunggu Aspirasi Masuk</h3>
      <p class="text-sm mt-3 text-slate-500 tracking-wide">Scan QR Code di layar untuk mulai berpartisipasi</p>
    </div>

    <!-- Masonry Grid -->
    <div id="aspirasiGrid" class="w-full relative mx-auto">
      <!-- Grid Sizer for Masonry -->
      <div class="grid-sizer w-1/3 max-lg:w-1/2 max-sm:w-full"></div>
      
      <!-- Cards will be injected here -->
    </div>

  </main>

  <script type="module" src="./js/dashboard.js"></script>
  <script>
    // Initialize Particles (Slow moving golden dust)
    tsParticles.load("tsparticles", {
      background: { color: { value: "transparent" } },
      fpsLimit: 60,
      particles: {
        color: { value: "#d4af37" }, 
        move: { enable: true, speed: 0.5, direction: "none", random: true, straight: false },
        number: { density: { enable: true, area: 800 }, value: 60 },
        opacity: { value: { min: 0.1, max: 0.5 }, animation: { enable: true, speed: 1, sync: false } },
        shape: { type: "circle" },
        size: { value: { min: 1, max: 3 } },
      },
      detectRetina: true,
    });
  </script>
</body>
</html>
