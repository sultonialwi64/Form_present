<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kirim Aspirasi - FKP PEKPPP 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- GSAP & tsParticles -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js"></script>
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      /* Premium gradient background */
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: #333;
    }
    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }
    .premium-card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 215, 0, 0.3); /* Subtle gold border */
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.5);
    }
    .gold-gradient-text {
      background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .premium-input {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      transition: all 0.3s ease;
    }
    .premium-input:focus {
      background: #fff;
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
    }
    .premium-btn {
      background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
      border: 1px solid #3b82f6;
      box-shadow: 0 10px 15px -3px rgba(30, 58, 138, 0.4);
      transition: all 0.3s ease;
    }
    .premium-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 20px -3px rgba(30, 58, 138, 0.5);
    }
    /* Simple spinner */
    .spinner {
      border: 3px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      border-top: 3px solid #d4af37;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: none;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #tsparticles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
  </style>
</head>
<body class="min-h-screen flex px-4 py-12 relative overflow-x-hidden">
  
  <!-- Particle Background -->
  <div id="tsparticles"></div>
  
  <!-- Decorative background elements -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-900/40 blur-[120px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-amber-600/20 blur-[120px]"></div>

  <main class="w-full max-w-md premium-card rounded-3xl p-8 sm:p-10 relative z-10 form-container opacity-0 m-auto">
    <!-- Header -->
    <div class="text-center mb-8 form-header">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-br from-slate-900 to-slate-800 rounded-full mb-5 shadow-lg border border-slate-700">
        <svg class="w-6 h-6 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 tracking-tight mb-2">Suara Anda</h1>
      <p class="text-sm font-medium text-slate-500 uppercase tracking-widest">FKP PEKPPP 2026</p>
      <div class="w-12 h-0.5 bg-gradient-to-r from-transparent via-yellow-500 to-transparent mx-auto mt-4"></div>
    </div>

    <!-- Form -->
    <form id="aspirasiForm" class="space-y-6">
      <div class="form-group">
        <label for="nama" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Nama Lengkap</label>
        <input type="text" id="nama" name="nama" required placeholder="Masukkan nama Anda"
          class="w-full px-4 py-3.5 rounded-xl premium-input outline-none text-slate-800" />
      </div>

      <div class="form-group">
        <label for="unit_kerja" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Unit Kerja / Instansi</label>
        <input type="text" id="unit_kerja" name="unit_kerja" required placeholder="Contoh: Bidang Pembinaan SD"
          class="w-full px-4 py-3.5 rounded-xl premium-input outline-none text-slate-800" />
      </div>

      <div class="form-group">
        <label for="saran" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Masukan / Aspirasi</label>
        <textarea id="saran" name="saran" required rows="4" placeholder="Tuliskan gagasan brilian Anda di sini..."
          class="w-full px-4 py-3.5 rounded-xl premium-input outline-none text-slate-800 resize-y"></textarea>
      </div>

      <div class="form-group pt-2">
        <button type="submit" id="submitBtn"
          class="w-full premium-btn text-white font-medium tracking-wide py-4 px-4 rounded-xl flex items-center justify-center gap-3">
          <span>KIRIM ASPIRASI</span>
          <div class="spinner" id="btnSpinner"></div>
        </button>
      </div>
    </form>

    <!-- Success Overlay -->
    <div id="successState" class="absolute inset-0 bg-white/95 backdrop-blur-md z-10 hidden flex-col items-center justify-center p-8 text-center transition-opacity duration-500 rounded-3xl">
      <div class="w-20 h-20 bg-gradient-to-br from-green-400 to-emerald-600 rounded-full flex items-center justify-center mb-6 shadow-xl shadow-green-200">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
      </div>
      <h2 class="text-3xl font-bold text-gray-900 mb-3" style="font-family: 'Playfair Display', serif;">Terima Kasih</h2>
      <p class="text-slate-500 mb-8 leading-relaxed">Suara Anda sangat berharga. Aspirasi Anda telah dicatat dan akan segera ditampilkan di layar utama.</p>
      <button onclick="resetForm()" class="premium-btn text-white text-sm font-medium px-8 py-3.5 rounded-full tracking-wide">Kirim Aspirasi Lain</button>
    </div>

  </main>

  <script type="module" src="./js/app.js"></script>
  <script>
    // Initialize Particles
    tsParticles.load("tsparticles", {
      background: { color: { value: "transparent" } },
      fpsLimit: 60,
      particles: {
        color: { value: "#d4af37" }, // Gold particles
        links: {
          color: "#d4af37",
          distance: 150,
          enable: true,
          opacity: 0.2,
          width: 1,
        },
        move: { enable: true, speed: 1, direction: "none", random: true, straight: false },
        number: { density: { enable: true, area: 800 }, value: 40 },
        opacity: { value: 0.3 },
        shape: { type: "circle" },
        size: { value: { min: 1, max: 3 } },
      },
      detectRetina: true,
    });

    // GSAP Entrance Animations
    window.addEventListener("DOMContentLoaded", () => {
      const tl = gsap.timeline();
      tl.to(".form-container", { opacity: 1, duration: 0.8, ease: "power2.out" })
        .from(".form-header", { y: -20, opacity: 0, duration: 0.6, ease: "back.out(1.7)" }, "-=0.2")
        .from(".form-group", { y: 20, opacity: 0, duration: 0.5, stagger: 0.1, ease: "power2.out" }, "-=0.3");
    });
  </script>
</body>
</html>
