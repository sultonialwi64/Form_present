<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kirim Aspirasi - FKP PEKPPP 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- GSAP & tsParticles -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.12.0/tsparticles.slim.bundle.min.js"></script>
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      /* Premium gradient background */
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: #333;
    }
    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }
    .premium-card {
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 215, 0, 0.2);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.05);
    }
    .gold-gradient-text {
      background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .premium-input {
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(71, 85, 105, 0.5);
      color: #f8fafc;
      transition: all 0.3s ease;
    }
    .premium-input::placeholder {
      color: #64748b;
    }
    .premium-input:focus {
      background: rgba(30, 41, 59, 0.9);
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    }
    .premium-btn {
      background: linear-gradient(135deg, #b38728 0%, #d4af37 50%, #aa771c 100%);
      border: none;
      color: #0f172a;
      font-weight: 700;
      box-shadow: 0 10px 20px -5px rgba(212, 175, 55, 0.4);
      transition: all 0.3s ease;
    }
    .premium-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -5px rgba(212, 175, 55, 0.5);
      filter: brightness(1.1);
    }
    /* Simple spinner */
    .spinner {
      border: 3px solid rgba(15, 23, 42, 0.2);
      border-radius: 50%;
      border-top: 3px solid #0f172a;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: none;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* Particles Canvas */
    #tsparticles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
  </style>
</head>
<body class="min-h-screen flex px-4 py-12 relative overflow-x-hidden">
  
  <!-- Particle Background -->
  <div id="tsparticles"></div>
  
  <!-- Decorative background elements -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-900/40 blur-[120px]"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-amber-600/20 blur-[120px]"></div>

  <main class="w-full max-w-md premium-card rounded-3xl p-8 sm:p-10 relative z-10 form-container opacity-0 m-auto my-8">
    <!-- Header -->
    <div class="text-center mb-10 form-header">
      <div class="inline-flex items-center justify-center w-28 h-28 mb-4">
        <img src="./img/logo_disdikpora.png?v=1" alt="Logo Disdikpora" class="w-full h-full object-contain drop-shadow-2xl" onerror="this.style.display='none'" />
      </div>
      <h1 class="text-3xl sm:text-4xl font-bold gold-gradient-text tracking-tight mb-3">Forum Konsultasi Publik</h1>
      <p class="text-sm font-semibold text-slate-300 uppercase tracking-widest leading-relaxed">Standar Pelayanan Jenjang SD dan SMP</p>
      <div class="w-16 h-0.5 bg-gradient-to-r from-transparent via-yellow-500 to-transparent mx-auto mt-6"></div>
    </div>

    <!-- Form -->
    <form id="aspirasiForm" class="space-y-6">
      <div class="form-group">
        <label for="nama" class="block text-xs font-semibold text-yellow-500/80 uppercase tracking-wider mb-2">Nama Lengkap</label>
        <input type="text" id="nama" name="nama" required placeholder="Masukkan nama Anda"
          class="w-full px-4 py-3.5 rounded-xl premium-input outline-none" />
      </div>

      <div class="form-group">
        <label for="unit_kerja" class="block text-xs font-semibold text-yellow-500/80 uppercase tracking-wider mb-2">Unit Kerja / Instansi</label>
        <input type="text" id="unit_kerja" name="unit_kerja" required placeholder="Contoh: SD N 1 WONOSOBO"
          class="w-full px-4 py-3.5 rounded-xl premium-input outline-none" />
      </div>

      <div class="form-group">
        <label for="saran" class="block text-xs font-semibold text-yellow-500/80 uppercase tracking-wider mb-2">Masukan / Aspirasi</label>
        <textarea id="saran" name="saran" required rows="4" placeholder="Tuliskan gagasan brilian Anda di sini..."
          class="w-full px-4 py-3.5 rounded-xl premium-input outline-none resize-y"></textarea>
      </div>

      <button type="submit" id="submitBtn"
        class="w-full mt-8 flex items-center justify-center gap-3 py-4 px-6 rounded-xl premium-btn cursor-pointer">
        <span id="btnText" class="tracking-wide text-sm">KIRIM ASPIRASI</span>
        <div id="btnSpinner" class="spinner"></div>
      </button>
    </form>

    <!-- Success Overlay -->
    <div id="successState" class="absolute inset-0 bg-white/95 backdrop-blur-md z-10 hidden flex-col items-center justify-center p-8 text-center transition-opacity duration-500 rounded-3xl">
      <div class="w-20 h-20 bg-gradient-to-br from-green-400 to-emerald-600 rounded-full flex items-center justify-center mb-6 shadow-xl shadow-green-200">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
      </div>
      <h2 class="text-3xl font-bold text-gray-900 mb-3" style="font-family: 'Playfair Display', serif;">Terima Kasih</h2>
      <p class="text-slate-500 mb-8 leading-relaxed">Suara Anda sangat berharga. Aspirasi Anda telah dicatat dan akan segera ditampilkan di layar utama.</p>
      <button onclick="resetForm()" class="premium-btn text-white text-sm font-medium px-8 py-3.5 rounded-full tracking-wide">Kirim Aspirasi Lain</button>
    </div>

  </main>

  <script type="module" src="./js/app.js"></script>
  <script>
    // Initialize Particles
    tsParticles.load("tsparticles", {
      background: { color: { value: "transparent" } },
      fpsLimit: 60,
      particles: {
        color: { value: "#d4af37" }, // Gold particles
        links: {
          color: "#d4af37",
          distance: 150,
          enable: true,
          opacity: 0.2,
          width: 1,
        },
        move: { enable: true, speed: 1, direction: "none", random: true, straight: false },
        number: { density: { enable: true, area: 800 }, value: 40 },
        opacity: { value: 0.3 },
        shape: { type: "circle" },
        size: { value: { min: 1, max: 3 } },
      },
      detectRetina: true,
    });

    // GSAP Entrance Animations
    window.addEventListener("DOMContentLoaded", () => {
      const tl = gsap.timeline();
      tl.to(".form-container", { opacity: 1, duration: 0.8, ease: "power2.out" })
        .from(".form-header", { y: -20, opacity: 0, duration: 0.6, ease: "back.out(1.7)" }, "-=0.2")
        .from(".form-group", { y: 20, opacity: 0, duration: 0.5, stagger: 0.1, ease: "power2.out" }, "-=0.3");
    });
  </script>
</body>
</html>
